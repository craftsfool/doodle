name: Update Doodle Archive

on:
  workflow_dispatch:
  schedule:
    - cron: '18 3 * * *'

permissions:
  contents: write

jobs:
  update-doodles:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update archive
        run: npm run doodles:update

      - name: Commit archive changes
        run: |
          if git diff --quiet -- public/doodles doodleArchive.ts; then
            echo "No Doodle archive changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/doodles doodleArchive.ts
          git commit -m "Update Doodle archive"
          git push
